<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Patients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Patient Records</h2>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Age</th><th>Phone</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="patient : ${patientsList}">
                <td th:text="${patient.id}"></td>
                <td th:text="${patient.fullname}"></td>
                <td th:text="${patient.age}"></td>
                <td th:text="${patient.phone}"></td>
                <td>
                    <a th:href="@{/updatePatientForm/{id}(id=${patient.id})}" class="btn btn-sm btn-warning">Edit</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/addNewPatientForm}" class="btn btn-primary">New Patient</a>
</body>
</html>
