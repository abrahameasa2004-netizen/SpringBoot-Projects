<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Doctor Directory</h2>
        <table class="table table-dark table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th><th>Name</th><th>Specialization</th><th>Department</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="doctor : ${doctorsList}">
                    <td th:text="${doctor.id}"></td>
                    <td th:text="${doctor.fullname}"></td>
                    <td th:text="${doctor.specialization}"></td>
                    <td th:text="${doctor.department}"></td>
                    <td>
                        <a th:href="@{/updateDoctorForm/{id}(id=${doctor.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/delete/doctor/{id}(id=${doctor.id})}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/addNewDoctorForm}" class="btn btn-primary">Add Doctor</a>
        <a th:href="@{/admin-home}" class="btn btn-secondary">Back</a>
    </div>
</body>
</html>
