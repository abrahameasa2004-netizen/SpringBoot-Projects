<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <title>Confirmed Appointments</title>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <h1 class="text-center text-success p-5">Confirmed Appointments ✅</h1>
        </div>

        <div class="row shadow-lg p-3 mb-5 bg-white rounded">
            <table class="table table-hover text-center">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Doctor Name</th>
                        <th scope="col">Patient Name</th>
                        <th scope="col">Appointment Date</th>
                        <th scope="col">Appointment Time</th>
                        <th scope="col">Status</th>
                    </tr>
                </thead>
				<tbody>
				    <tr th:each="appointment : ${confirmedList}">
				        <td th:text="${appointment.id}"></td>
				        <td th:text="${appointment.doctor.fullname}"></td>
				        <td th:text="${appointment.patient.fullname}"></td>
				        <td th:text="${appointment.appointment_date}"></td>
				        <td th:text="${appointment.appointment_time}"></td>
				        <td>
				            <span class="badge bg-success">Confirmed</span>
				        </td>
				        <td>
				            <a th:href="@{/create-bill/{id}(id=${appointment.id})}" class="btn btn-primary btn-sm">Generate Bill</a>
				        </td>
				    </tr>
				    <tr th:if="${#lists.isEmpty(confirmedList)}">
				        <td colspan="7" class="text-muted">No confirmed appointments yet.</td>
				    </tr>
				</tbody>
            </table>
        </div>

        <div class="col text-center">
            <a th:href="@{/appointments}" class="btn btn-secondary px-4 py-2 fs-5">
                Back to Pending List
            </a>
            <a th:href="@{/admin-home}" class="btn btn-dark px-4 py-2 fs-5">
                Admin Dashboard
            </a>
			
        </div>
    </div>
</body>
</html>
