<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/style.css}" />
    <title>Appointments</title>
</head>

<body>
    <div class="container">

        <div class="row">
            <h1 class="text-center text-nowrap p-5 text-dark">Appointment Control</h1>
        </div>

        <div class="row mb-4">
            <div class="col text-end">
                <a th:href="@{/confirmed-appointments}" class="btn btn-success px-4 py-2 fs-5 shadow-sm">
                    View Confirmed Appointments ✅
                </a>
            </div>
        </div>

        <div class="row">
            <table class="table table-striped table-bordered table-hover text-center table-dark shadow-lg">
                <thead>
                    <tr class="text-danger">
                        <th scope="col">ID</th>
                        <th scope="col">Doctor Name</th>
                        <th scope="col">Patient Name</th>
                        <th scope="col">Date</th>
                        <th scope="col">Time</th>
                        <th scope="col">Action</th>
                        <th scope="col">Cancel</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appointment : ${appointments}" th:if="${appointment.status != 'Confirmed'}">
                        <td th:text="${appointment.id}"></td>
                        <td th:text="${appointment.doctor.fullname}"></td>
                        <td th:text="${appointment.patient.fullname}"></td>
                        <td th:text="${appointment.appointment_date}"></td>
                        <td th:text="${appointment.appointment_time}"></td>
                        <td>
                            <a th:href="@{/confirm/appointment/{id}(id=${appointment.id})}"
                               class="text-success fs-5 fw-bold" style="text-decoration: none;">Confirm</a>
                        </td>
                        <td>
                            <a th:href="@{/delete/appointment/{id}(id=${appointment.id})}"
                                onclick="return confirm('Are you sure you want to cancel this appointment?')"
                                class="text-danger fs-5" style="text-decoration: none;">Cancel</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="row mt-4">
            <div class="col text-center">
                <a th:href="@{/addNewAppointmentForm}" class="btn btn-dark px-4 py-2 fs-5 mx-2">Add Appointment</a>
                <a th:href="@{/admin-home}" class="btn btn-secondary px-4 py-2 fs-5 mx-2">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
