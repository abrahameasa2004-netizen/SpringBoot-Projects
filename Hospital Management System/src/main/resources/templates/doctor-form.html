<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h3>Doctor Registration</h3>
    <form th:action="@{/saveNewDoctor}" th:object="${doctor}" method="post">
        <div class="mb-3">
            <label>Full Name</label>
            <input type="text" th:field="*{fullname}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Specialization</label>
            <input type="text" th:field="*{specialization}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Department</label>
            <input type="text" th:field="*{department}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
    </form>
</body>
</html>
