<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h3>Patient Form</h3>
    <form th:action="@{/saveNewPatient}" th:object="${patient}" method="post">
        <input type="text" th:field="*{fullname}" placeholder="Full Name" class="form-control mb-3" required>
        <input type="number" th:field="*{age}" placeholder="Age" class="form-control mb-3" required>
        <select th:field="*{gender}" class="form-control mb-3">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="text" th:field="*{phone}" placeholder="Phone Number" class="form-control mb-3" required>
        <input type="email" th:field="*{email}" placeholder="Email" class="form-control mb-3" required>
        <button type="submit" class="btn btn-primary">Register Patient</button>
    </form>
</body>
</html>
