<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hospital Billing</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Invoices & Billing</h2>
        <table class="table table-bordered table-hover shadow bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Bill ID</th>
                    <th>Patient Name</th>
                    <th>Doctor</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="bill : ${billsList}">
                    <td th:text="${bill.id}"></td>
                    <td th:text="${bill.appointment.patient.fullname}"></td>
                    <td th:text="${bill.appointment.doctor.fullname}"></td>
                    <td th:text="${'$' + bill.amount}"></td>
                    <td>
                        <span th:class="${bill.billingStatus == 'Paid' ? 'badge bg-success' : 'badge bg-warning'}" 
                              th:text="${bill.billingStatus}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="text-center">
            <a th:href="@{/admin-home}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
