spring.application.name=HospitalManagementSystem-1
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/hospitaldb
spring.datasource.username=root
spring.datasource.password=Abraham
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Hibernate
spring.jpa.database-platform = org.hibernate.dialect.MySQLDialect

#Hibernate auto ddl
spring.jpa.hibernate.ddl-auto=update

logging.level.org.hibernate.SQL=DEBUG
# Prefix: The path to the folder (starting from resources)
spring.thymeleaf.prefix=classpath:/templates/

# Suffix: The file extension
spring.thymeleaf.suffix=.html

# Optional: Disable caching so changes show up immediately during development
spring.thymeleaf.cache=false