<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center text-success">Cast Your Vote</h2>

        <form th:action="@{/vote}" method="post">

            <div class="mb-3">
                <label>Enter Voter ID</label>
                <input type="text" class="form-control" name="voterId" required>
            </div>

            <div class="mb-3">
                <label>Select Candidate</label>
                <select class="form-control" name="candidateId" required>
                    <option th:each="c : ${@candidateRepository.findAll()}"
                            th:value="${c.id}"
                            th:text="${c.name + ' - ' + c.party}">
                    </option>
                </select>
            </div>

            <button class="btn btn-success w-100">Submit Vote</button><br><br>
			<a href="/" class="btn btn-success w-100">Back</a>
        </form>

        <div class="text-danger mt-2" th:text="${error}"></div>
        <div class="text-success mt-2" th:text="${success}"></div>

    </div>
</div>

</body>
</html>
