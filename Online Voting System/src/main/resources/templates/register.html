<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary mb-4">Voter Registration</h2>

        <form th:action="@{/register}" method="post" onsubmit="return validateAge()">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="mb-3">
                <label>Voter ID</label>
                <input type="text" id="voterId" class="form-control" name="voterId" required>
                <small id="voterError" class="text-danger"></small>
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <select class="form-control" name="gender" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
					<option>Transgender</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-control" name="dob" required>
                <small id="ageError" class="text-danger"></small>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <a href="/vote" class="btn btn-success">Go to Vote</a>
            <a href="/admin/login" class="btn btn-dark">Admin Login</a>
        </div>
    </div>
</div>

<script>

// Voter ID duplicate check
document.getElementById("voterId").addEventListener("keyup", function() {

    let voterId = this.value;

    fetch("/check-voter-id?voterId=" + voterId)
        .then(response => response.json())
        .then(data => {

            if(data === true){
                document.getElementById("voterError").innerText = "Voter ID already exists!";
            } else {
                document.getElementById("voterError").innerText = "";
            }
        });
});


// ✅ Age Validation Function
function validateAge() {

    let dobInput = document.getElementById("dob").value;

    if(!dobInput){
        return false;
    }

    let dob = new Date(dobInput);
    let today = new Date();

    let age = today.getFullYear() - dob.getFullYear();
    let monthDifference = today.getMonth() - dob.getMonth();

    if (monthDifference < 0 || (monthDifference === 0 && today.getDate() < dob.getDate())) {
        age--;
    }

    if(age < 18){
        document.getElementById("ageError").innerText = "You must be at least 18 years old to register.";
        return false; // ❌ Prevent form submission
    } else {
        document.getElementById("ageError").innerText = "";
        return true; // ✅ Allow submission
    }
}

</script>

</body>
</html>
