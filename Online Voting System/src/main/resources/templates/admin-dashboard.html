<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- Top Header Section -->
    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <h2 class="mb-3">Admin Dashboard</h2>
        <div class="mb-3">
            <a href="/admin/voters" class="btn btn-info me-2">View Voters</a>
            <a href="/admin/results" class="btn btn-success">View Results</a>
			<a href="/" class="btn btn-success">Back</a>
        </div>
    </div>

	<!-- Dashboard Statistics -->
	<div class="row text-center mt-3">

	    <div class="col-md-4 mb-3">
	        <div class="card shadow bg-primary text-white p-3">
	            <h3 th:text="${totalVoters}">0</h3>
	            <p class="mb-0">Total Voters</p>
	        </div>
	    </div>

	    <div class="col-md-4 mb-3">
	        <div class="card shadow bg-success text-white p-3">
	            <h3 th:text="${votedCount}">0</h3>
	            <p class="mb-0">Votes Cast</p>
	        </div>
	    </div>

	    <div class="col-md-4 mb-3">
	        <div class="card shadow bg-warning text-dark p-3">
	            <h3 th:text="${totalCandidates}">0</h3>
	            <p class="mb-0">Total Candidates</p>
	        </div>
	    </div>

	</div>
	
    <!-- Add Candidate Section -->
    <div class="card p-4 shadow mt-3">
        <h4 class="mb-3">Add Candidate</h4>

        <form th:action="@{/admin/add-candidate}" method="post">
            <div class="row">
                <div class="col-md-5 mb-2">
                    <input type="text" name="name" placeholder="Candidate Name"
                           class="form-control" required>
                </div>

                <div class="col-md-5 mb-2">
                    <input type="text" name="party" placeholder="Party Name"
                           class="form-control" required>
                </div>

                <div class="col-md-2 mb-2 d-grid">
                    <button class="btn btn-primary">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Candidate List Section -->
    <div class="card p-4 shadow mt-4">
        <h4 class="mb-3">Candidate List</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Party</th>
                        <th style="width:180px;">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="c : ${candidates}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.party}"></td>
                        <td>
                            <a th:href="@{'/admin/edit/' + ${c.id}}"
                               class="btn btn-sm btn-warning me-1">Edit</a>

                            <a th:href="@{'/admin/delete/' + ${c.id}}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this candidate?')">
                               Delete
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(candidates)}">
                        <td colspan="3" class="text-muted">No candidates available</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
